    <!-- Structured Data: FAQPage (GEO — AI citation) -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "FAQPage",
      "mainEntity": [
        {
          "@type": "Question",
          "name": "O que é a Brick AI?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Brick AI é uma produtora generativa brasileira fundada em 2016. Combinamos direção artística e cinematográfica humana com sistemas de geração sintética para criar campanhas publicitárias, VFX e conteúdo visual premium. Somos uma divisão especializada da Brick, produtora com histórico em clientes como Stone, Visa, BBC e L'Oréal."
          }
        },
        {
          "@type": "Question",
          "name": "Qual é o diferencial da Brick AI em relação a produtoras tradicionais?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "A Brick AI opera no que chamamos de 'Set Infinito': qualquer cenário, contexto ou estética, produzido com qualidade cinematográfica e em uma fração do tempo e custo da produção convencional. Enquanto produtoras tradicionais estão limitadas por logística física — locações, equipamento, viagens —, nós removemos essas barreiras sem abrir mão do padrão de direção humana."
          }
        },
        {
          "@type": "Question",
          "name": "Como a Brick AI garante que o resultado não vai parecer genérico ou estranho?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "A maior parte do conteúdo gerado sem direção artística resulta em automação sem autoria. Na Brick AI, toda produção passa por curadoria humana rigorosa: direção de arte, color grading, sound design e montagem são conduzidos por profissionais com mais de 10 anos de experiência em set. Os sistemas de geração criam a base estrutural; a finalização de elite é aplicada pela equipe."
          }
        },
        {
          "@type": "Question",
          "name": "A Brick AI já trabalhou com grandes marcas?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Sim. O portfólio da Brick inclui projetos para Stone, Visa, BBC, Record TV, AliExpress, Keeta, Facebook, O Boticário e L'Oréal. O curta 'Inheritance', produzido pela Brick AI, foi seleção oficial do Festival de Cinema de Gramado 2025, sendo um dos primeiros filmes gerativos a competir no festival."
          }
        },
        {
          "@type": "Question",
          "name": "O que é Produção Híbrida?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Produção Híbrida é a metodologia da Brick AI que combina filmagem tradicional, pós-produção clássica e sistemas de geração sintética em um único fluxo de trabalho. O resultado é conteúdo com a qualidade e intenção artística de uma grande produção, com a agilidade e viabilidade de orçamento da geração digital."
          }
        },
        {
          "@type": "Question",
          "name": "Quanto tempo leva uma produção com sistemas generativos na Brick AI?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "O processo generativo reduz significativamente os prazos em relação à produção tradicional. Projetos que levariam 45 dias em uma produção convencional podem ser entregues em 10 a 15 dias úteis. O briefing, a aprovação de referências visuais e o alinhamento criativo são as etapas mais determinantes do prazo total."
          }
        },
        {
          "@type": "Question",
          "name": "Usar sistemas de geração sintética na produção de vídeo é seguro juridicamente?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "A Brick AI opera como produtora, não como fornecedora de software. Toda entrega é uma obra audiovisual licenciada pela Brick, com os mesmos contratos e segurança jurídica de qualquer produção tradicional. Os projetos para Visa e Stone seguem os mesmos padrões de compliance exigidos por essas empresas em suas produções convencionais."
          }
        }
      ]
    }
